name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec paraglide-js compile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm knip

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  e2e-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci/pr-${{ github.event.pull_request.number || github.sha }}
          api_key: ${{ secrets.NEON_API_KEY }}
      - run: pnpm db:push
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
      - run: pnpm build
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      - run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      - name: Delete Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ci/pr-${{ github.event.pull_request.number || github.sha }}
          api_key: ${{ secrets.NEON_API_KEY }}

  migrate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
